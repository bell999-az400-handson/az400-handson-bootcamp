trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - docs/*
      - README.md
      - '**/*.md'

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - docs/*
      - README.md

variables:
  nodeVersion: '18.x'
  workingDirectory: 'src/webapp'
  acrName: 'az400acr'
  azureSubscription: 'AzureServiceConnection'
  acrServiceConnection: 'ACRServiceConnection'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildJob
        displayName: 'Build Application'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)
          
          - script: npm ci
            displayName: 'Install dependencies'
            workingDirectory: $(workingDirectory)
          
          - script: npm run lint || echo "No lint script"
            displayName: 'Run linter'
            workingDirectory: $(workingDirectory)
            continueOnError: true
          
          - script: npm test
            displayName: 'Run tests'
            workingDirectory: $(workingDirectory)
          
          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(workingDirectory)/**/test-results.xml'
              failTaskOnFailedTests: true
          
          - task: PublishCodeCoverageResults@1
            displayName: 'Publish code coverage'
            condition: succeededOrFailed()
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(workingDirectory)/coverage/cobertura-coverage.xml'
      
      - job: DockerBuild
        displayName: 'Build Docker Image'
        dependsOn: BuildJob
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          - task: Docker@2
            displayName: 'Build and Push Docker Image'
            inputs:
              containerRegistry: $(acrServiceConnection)
              repository: 'az400webapp'
              command: 'buildAndPush'
              Dockerfile: '$(workingDirectory)/Dockerfile'
              buildContext: '$(workingDirectory)'
              tags: |
                $(Build.BuildId)
                latest

  - stage: DeployDev
    displayName: 'Deploy to Development'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to Dev'
        environment: 'development'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy to Azure Web App'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appName: 'az400-dev-webapp'
                    containers: '$(acrName).azurecr.io/az400webapp:$(Build.BuildId)'
                
                - task: AzureCLI@2
                  displayName: 'Smoke test'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      sleep 30
                      curl -f https://az400-dev-webapp.azurewebsites.net/health || exit 1

  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: DeployDev
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to Staging'
        environment: 'staging'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy to Staging Web App'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appName: 'az400-staging-webapp'
                    containers: '$(acrName).azurecr.io/az400webapp:$(Build.BuildId)'
                
                - task: AzureCLI@2
                  displayName: 'Integration tests'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Running integration tests..."
                      sleep 30
                      curl -f https://az400-staging-webapp.azurewebsites.net/health || exit 1

  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: DeployStaging
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to Production'
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy to Production Web App'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appName: 'az400-prod-webapp'
                    containers: '$(acrName).azurecr.io/az400webapp:$(Build.BuildId)'
                
                - task: AzureCLI@2
                  displayName: 'Production smoke test'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      sleep 30
                      curl -f https://az400-prod-webapp.azurewebsites.net/health || exit 1
                      echo "🎉 Production deployment completed!"
